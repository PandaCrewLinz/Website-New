{{- $text := .text | default "Lassen Sie uns gemeinsam Ihre digitale Zukunft gestalten." -}}
{{- $buttonText := .buttonText | default "Kontakt aufnehmen" -}}
<section class="cta-bar">
  <div class="cta-bar__inner">
    <p class="cta-bar__text"><strong>Bereit, loszulegen?</strong> {{ $text }}</p>
    <a href="{{ "kontakt/" | relURL }}" class="cta-bar__button">{{ $buttonText }}</a>
  </div>
</section>
